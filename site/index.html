        />
        <link rel="stylesheet" href="styles.css" />

        <!-- Single source of truth for all resume content -->
        <script type="application/json" id="resume-data">

    </head>
    <body>
        <div class="terminal-wrap">
            <div
                class="terminal"
                id="terminal"
                role="application"
                aria-label="Interactive resume terminal"
            >
                <div class="header">
                    <div class="dots">
                        <span class="dott"></span>
                        <span class="dott"></span>
                        <span class="dott"></span>
                    </div>
                    <div class="title">guest@ortega — resume</div>
                    <button
                        class="doc-btn"
                        id="open-doc"
                        type="button"
                        title="View the whole resume as one page"
                    >
                        ▤ full resume
                    </button>
                </div>

                <div id="screen" class="screen" tabindex="0"></div>

                <div class="help">
                    Try
                    <span class="muted">help</span>,
                    <span class="muted">about</span>,
                    <span class="muted">skills</span>,
                    <span class="muted">experience</span>,
                    <span class="muted">contact</span>, or
                    <span class="muted">resume</span> to view it all at once.
                </div>
            </div>
        </div>

        <!-- Full-resume document overlay -->
        <div
            class="doc-overlay"
            id="doc-overlay"
            role="dialog"
            aria-modal="true"
            aria-label="Full resume"
            hidden
        >
            <div class="doc-toolbar">
                <button class="doc-action" id="print-doc" type="button">⇩ Save as PDF</button>
                <button class="doc-action doc-close" id="close-doc" type="button">✕ Close</button>
            </div>
            <div class="doc-scroll">
                <article class="resume-doc" id="resume-doc"></article>
            </div>
        </div>

        <div class="scanlines" aria-hidden="true"></div>

        <script>
            "use strict";

            // ---- Resume data (single source of truth) --------------------
            const DATA = JSON.parse(
                document.getElementById("resume-data").textContent,
            );

            const screen = document.getElementById("screen");
            const terminal = document.getElementById("terminal");

            // ---- Helpers -------------------------------------------------
            const esc = (s) =>
                String(s)
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;");

            function scrollToBottom() {
                terminal.scrollTop = terminal.scrollHeight;
            }

            // Append a block of output. `html` may contain markup we built.
            function print(html = "", cls = "") {
                const block = document.createElement("div");
                block.className = "output" + (cls ? " " + cls : "");
                block.innerHTML = html;
                screen.appendChild(block);
                scrollToBottom();
            }

            function fmtRange(job) {
                return `${job.start} – ${job.end}`;
            }

            // ---- Virtual filesystem (mirrors the resume sections) --------
            function buildFS() {
                const expChildren = {};
                for (const job of DATA.experience) {
                    expChildren[job.slug + ".txt"] = {
                        type: "file",
                        render: () => renderJob(job),
                    };
                }
                return {
                    type: "dir",
                    children: {
                        "about.txt": { type: "file", render: renderAbout },
                        "skills.txt": { type: "file", render: renderSkills },
                        "contact.txt": { type: "file", render: renderContact },
                        experience: { type: "dir", children: expChildren },
                        "resume.pdf": { type: "file", binary: true },
                    },
                };
            }
            const FS = buildFS();
            let cwd = [];

            function getNode(pathArr) {
                let node = FS;
                for (const seg of pathArr) {
                    if (!node.children || !node.children[seg]) return null;
                    node = node.children[seg];
                }
                return node;
            }
            function resolvePath(pathStr) {
                if (!pathStr || pathStr.trim() === "") return cwd.slice();
                const parts = pathStr.split("/").filter((p) => p !== "");
                let result = pathStr.startsWith("/") ? [] : cwd.slice();
                for (const p of parts) {
                    if (p === "." || p === "~") {
                        if (p === "~") result = [];
                        continue;
                    }
                    if (p === "..") {
                        if (result.length) result.pop();
                    } else result.push(p);
                }
                return result;
            }
            function promptPath() {
                return "~" + (cwd.length ? "/" + cwd.join("/") : "");
            }

            // ---- Section renderers (return HTML strings) ----------------
            function renderAbout() {
                return `<div class="card">
                    <div class="card-h">${esc(DATA.name)} — ${esc(DATA.title)}</div>
                    <p>${esc(DATA.summary)}</p>
                    <p class="dim">15+ years · ${esc(DATA.contact.location)} · type <span class="cmd">experience</span> to see the work history.</p>
                </div>`;
            }
            function renderSkills() {
                let rows = "";
                for (const [group, items] of Object.entries(DATA.skills)) {
                    rows += `<div class="skill-row"><span class="skill-k">${esc(group)}</span><span class="skill-v">${items.map(esc).join(", ")}</span></div>`;
                }
                return `<div class="card"><div class="card-h">Technical Skills</div>${rows}</div>`;
            }
            function renderContact() {
                const c = DATA.contact;
                return `<div class="card">
                    <div class="card-h">Contact</div>
                    <div class="skill-row"><span class="skill-k">email</span><span class="skill-v"><a href="mailto:${esc(c.email)}">${esc(c.email)}</a></span></div>
                    <div class="skill-row"><span class="skill-k">phone</span><span class="skill-v">${esc(c.phone)}</span></div>
                    <div class="skill-row"><span class="skill-k">location</span><span class="skill-v">${esc(c.location)}</span></div>
                    <div class="skill-row"><span class="skill-k">linkedin</span><span class="skill-v"><a href="${esc(c.linkedin)}" target="_blank" rel="noopener">${esc(c.linkedin)}</a></span></div>
                </div>`;
            }
            function renderJob(job) {
                const bullets = job.bullets
                    .map((b) => `<li>${esc(b)}</li>`)
                    .join("");
                return `<div class="card job">
                    <div class="job-h">
                        <span class="job-co">${esc(job.company)}</span>
                        <span class="job-when">${esc(fmtRange(job))}</span>
                    </div>
                    <div class="job-role">${esc(job.role)}</div>
                    <ul>${bullets}</ul>
                </div>`;
            }
            function renderAllExperience() {
                return DATA.experience.map(renderJob).join("");
            }

            // ---- Full-resume document overlay ---------------------------
            const overlay = document.getElementById("doc-overlay");
            const resumeDoc = document.getElementById("resume-doc");

            function buildDoc() {
                const c = DATA.contact;
                let skills = "";
                for (const [group, items] of Object.entries(DATA.skills)) {
                    skills += `<div class="d-skill"><span class="d-skill-k">${esc(group)}</span><span>${items.map(esc).join(", ")}</span></div>`;
                }
                let jobs = "";
                for (const job of DATA.experience) {
                    jobs += `<div class="d-job">
                        <div class="d-job-h"><span>${esc(job.company)}</span><span class="d-when">${esc(fmtRange(job))}</span></div>
                        <div class="d-role">${esc(job.role)}</div>
                        <ul>${job.bullets.map((b) => `<li>${esc(b)}</li>`).join("")}</ul>
                    </div>`;
                }
                resumeDoc.innerHTML = `
                    <header class="d-head">
                        <h1>${esc(DATA.name)}</h1>
                        <div class="d-title">${esc(DATA.title)}</div>
                        <div class="d-contact">
                            <a href="mailto:${esc(c.email)}">${esc(c.email)}</a> ·
                            <span>${esc(c.phone)}</span> ·
                            <span>${esc(c.location)}</span> ·
                            <a href="${esc(c.linkedin)}" target="_blank" rel="noopener">LinkedIn</a>
                        </div>
                    </header>
                    <section><h2>Professional Summary</h2><p>${esc(DATA.summary)}</p></section>
                    <section><h2>Core Competencies</h2><div class="d-skills">${skills}</div></section>
                    <section><h2>Professional Experience</h2>${jobs}</section>
                    <section class="d-refs"><p>${esc(DATA.references)}</p></section>`;
            }

            function openDoc() {
                buildDoc();
                overlay.hidden = false;
                document.body.classList.add("doc-open");
                document.getElementById("close-doc").focus();
            }
            function closeDoc() {
                overlay.hidden = true;
                document.body.classList.remove("doc-open");
                focusInput();
            }
            // Renders the full resume, then hands it to the browser's
            // print dialog (the accurate "Save as PDF" path — always in
            // sync with the data above, no stale file to maintain).
            function saveAsPdf() {
                if (overlay.hidden) openDoc();
                requestAnimationFrame(() => window.print());
            }

            document.getElementById("open-doc").addEventListener("click", openDoc);
            document.getElementById("close-doc").addEventListener("click", closeDoc);
            document
                .getElementById("print-doc")
                .addEventListener("click", saveAsPdf);
            overlay.addEventListener("click", (e) => {
                if (e.target === overlay) closeDoc();
            });

            // ---- Commands -----------------------------------------------
            const COMMANDS = {
                help() {
                    print(
                        `<div class="card"><div class="card-h">Commands</div>
                        <div class="skill-row"><span class="skill-k">about</span><span class="skill-v">professional summary</span></div>
                        <div class="skill-row"><span class="skill-k">skills</span><span class="skill-v">technical skills, grouped</span></div>
                        <div class="skill-row"><span class="skill-k">experience [name]</span><span class="skill-v">work history (e.g. <span class="cmd">experience zumba</span>)</span></div>
                        <div class="skill-row"><span class="skill-k">contact</span><span class="skill-v">how to reach me</span></div>
                        <div class="skill-row"><span class="skill-k">resume</span><span class="skill-v">open the full resume as one page</span></div>
                        <div class="skill-row"><span class="skill-k">pdf</span><span class="skill-v">save the full resume as a PDF (via print)</span></div>
                        <div class="skill-row"><span class="skill-k">ls / cd / cat / pwd</span><span class="skill-v">poke around the filesystem</span></div>
                        <div class="skill-row"><span class="skill-k">clear</span><span class="skill-v">clear the screen</span></div>
                        </div>`,
                    );
                },
                about: renderAndPrint(renderAbout),
                summary: renderAndPrint(renderAbout),
                whoami: renderAndPrint(renderAbout),
                skills: renderAndPrint(renderSkills),
                contact: renderAndPrint(renderContact),
                experience(args) {
                    if (args[0]) {
                        const q = args[0].toLowerCase();
                        const match = DATA.experience.find(
                            (j) =>
                                j.slug.includes(q) ||
                                j.company.toLowerCase().includes(q),
                        );
                        if (match) return print(renderJob(match));
                        return print(
                            `experience: no role matching '${esc(args[0])}'. Try: ${DATA.experience
                                .map((j) => j.slug)
                                .join(", ")}`,
                            "error",
                        );
                    }
                    print(renderAllExperience());
                },
                resume: openDoc,
                pdf() {
                    print(
                        `Rendering the resume for your browser's Save-as-PDF dialog …`,
                    );
                    saveAsPdf();
                },
                download() {
                    COMMANDS.pdf();
                },
                clear() {
                    screen.innerHTML = "";
                },
                pwd() {
                    print(promptPath());
                },
                ls(args) {
                    const target = args[0] ? resolvePath(args[0]) : cwd.slice();
                    const node = getNode(target);
                    if (!node || node.type !== "dir")
                        return print(
                            `ls: cannot access '${esc(args[0] || "")}': No such directory`,
                            "error",
                        );
                    const names = Object.keys(node.children).sort((a, b) => {
                        const A = node.children[a],
                            B = node.children[b];
                        if (A.type === B.type) return a.localeCompare(b);
                        return A.type === "dir" ? -1 : 1;
                    });
                    print(
                        names
                            .map((n) =>
                                node.children[n].type === "dir"
                                    ? `<span class="dir">${esc(n)}/</span>`
                                    : `<span class="file">${esc(n)}</span>`,
                            )
                            .join("   "),
                        "pre",
                    );
                },
                cd(args) {
                    const target = args[0] || "~";
                    const resolved = resolvePath(target);
                    const node = getNode(resolved);
                    if (!node)
                        return print(
                            `cd: ${esc(target)}: No such file or directory`,
                            "error",
                        );
                    if (node.type !== "dir")
                        return print(`cd: ${esc(target)}: Not a directory`, "error");
                    cwd = resolved;
                },
                cat(args) {
                    if (!args[0]) return print("cat: missing operand", "error");
                    const node = getNode(resolvePath(args[0]));
                    if (!node) return print(`cat: ${esc(args[0])}: No such file`, "error");
                    if (node.type === "dir")
                        return print(`cat: ${esc(args[0])}: Is a directory`, "error");
                    if (node.binary)
                        return print(
                            `cat: ${esc(args[0])}: binary file. Run <span class="cmd">resume</span> to view or <span class="cmd">pdf</span> to save as PDF.`,
                        );
                    print(node.render());
                },
                echo(args) {
                    print(esc(args.join(" ")), "pre");
                },
                sudo() {
                    print("Nice try. This resume runs in userspace. 🙂");
                },
            };

            function renderAndPrint(fn) {
                return () => print(fn());
            }

            const COMMAND_NAMES = Object.keys(COMMANDS);

            function run(raw) {
                const parts = raw.trim().split(/\s+/).filter(Boolean);
                if (!parts.length) return;
                const cmd = parts[0].toLowerCase();
                const args = parts.slice(1);
                if (COMMANDS[cmd]) COMMANDS[cmd](args);
                else
                    print(
                        `${esc(cmd)}: command not found. Type <span class="cmd">help</span>.`,
                        "error",
                    );
            }

            // ---- Input line + history + tab completion ------------------
            const history = [];
            let historyIndex = -1;
            let activeInput = null;

            function newPrompt() {
                const line = document.createElement("div");
                line.className = "prompt";
                line.innerHTML = `<span class="meta">guest@ortega:<span class="path">${esc(promptPath())}</span>$</span>`;
                const input = document.createElement("span");
                input.className = "input";
                input.contentEditable = "true";
                input.spellcheck = false;
                line.appendChild(input);
                screen.appendChild(line);
                activeInput = input;

                input.addEventListener("keydown", onKey);
                input.focus();
                scrollToBottom();
            }

            function onKey(e) {
                const input = e.currentTarget;
                if (e.key === "Enter") {
                    e.preventDefault();
                    const raw = input.textContent.trim();
                    input.contentEditable = "false";
                    input.removeEventListener("keydown", onKey);
                    if (raw) {
                        history.unshift(raw);
                        historyIndex = -1;
                    }
                    run(raw);
                    newPrompt();
                } else if (e.key === "ArrowUp") {
                    e.preventDefault();
                    navHistory(1, input);
                } else if (e.key === "ArrowDown") {
                    e.preventDefault();
                    navHistory(-1, input);
                } else if (e.key === "Tab") {
                    e.preventDefault();
                    complete(input);
                } else if (e.ctrlKey && e.key.toLowerCase() === "c") {
                    e.preventDefault();
                    input.contentEditable = "false";
                    input.removeEventListener("keydown", onKey);
                    print("^C");
                    newPrompt();
                } else if (e.ctrlKey && e.key.toLowerCase() === "l") {
                    e.preventDefault();
                    screen.innerHTML = "";
                    newPrompt();
                }
            }

            function navHistory(dir, input) {
                if (!history.length) return;
                historyIndex = Math.max(
                    -1,
                    Math.min(history.length - 1, historyIndex + dir),
                );
                input.textContent = historyIndex === -1 ? "" : history[historyIndex];
                placeCaretEnd(input);
            }

            function complete(input) {
                const text = input.textContent;
                const parts = text.split(/\s+/);
                const isFirst = parts.length <= 1;
                const frag = parts[parts.length - 1] || "";
                let pool;
                if (isFirst) {
                    pool = COMMAND_NAMES;
                } else {
                    const node = getNode(cwd);
                    pool = node && node.children ? Object.keys(node.children) : [];
                }
                const matches = pool.filter((p) => p.startsWith(frag));
                if (matches.length === 1) {
                    parts[parts.length - 1] = matches[0];
                    input.textContent = parts.join(" ");
                    placeCaretEnd(input);
                } else if (matches.length > 1) {
                    const carry = input.textContent;
                    input.contentEditable = "false";
                    input.removeEventListener("keydown", onKey);
                    print(matches.join("   "), "pre");
                    newPrompt();
                    activeInput.textContent = carry;
                    placeCaretEnd(activeInput);
                }
            }

            function placeCaretEnd(el) {
                const range = document.createRange();
                range.selectNodeContents(el);
                range.collapse(false);
                const sel = window.getSelection();
                sel.removeAllRanges();
                sel.addRange(range);
            }

            function focusInput() {
                if (activeInput && activeInput.isContentEditable) {
                    activeInput.focus();
                    placeCaretEnd(activeInput);
                }
            }

            // Click anywhere in the terminal refocuses the prompt (unless
            // the user is selecting text or the doc overlay is open).
            terminal.addEventListener("click", () => {
                if (overlay.hidden && !window.getSelection().toString())
                    focusInput();
            });

            document.addEventListener("keydown", (e) => {
                if (e.key === "Escape" && !overlay.hidden) closeDoc();
            });

            // ---- Boot ----------------------------------------------------
            const BANNER = String.raw`
   ___                  _               ___       _
  |   \ __ _ _ __  (_)__ _ _ _   / _ \ _ _| |_ ___ __ _ __ _
  | |) / _' | '  \ | / _' | ' \ | (_) | '_|  _/ -_) _' / _' |
  |___/\__,_|_|_|_||_\__,_|_||_| \___/|_|  \__\___\__, \__,_|
                                                  |___/`;

            print(`<pre class="banner">${esc(BANNER)}</pre>`);
            print(
                `<span class="dim">${esc(DATA.name)} · ${esc(DATA.title)} · resume-terminal v1.0</span>`,
            );
            print(
                `Type <span class="cmd">help</span> to list commands, or <span class="cmd">resume</span> / hit <span class="cmd">▤ full resume</span> to read it all at once.`,
            );
            print("");
            newPrompt();
        </script>
    </body>
</html>
