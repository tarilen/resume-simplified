title: "About Me"
header: |
  ┌───────────────────────────────────────────────┐
  │                Damian Ortega                  │
  │               DevOps / SRE · he/him           │
  └───────────────────────────────────────────────┘
description: |
  Short biography and approach — presented as YAML for a playful, config-like UX.
body: |
  I’m a DevOps/SRE engineer with 15 years working across cloud and on-prem environments.
  I specialize in CI/CD, observability, and automation—turning messy systems into tidy
  pipelines that run fast and cost-effectively. Comfortable in AWS & Azure; happiest
  when dashboards are green and bills trend down.

  I build collaborative teams, mentor peers, and invest in coaching, feedback, and
  knowledge sharing to help others grow and succeed.

